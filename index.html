<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>NexeSocial - Accés Protegit</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <style>
        /* Mantenim els teus estils originals que són excel·lents */
        .login-body {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: url('img/fondo-login.png') no-repeat center center fixed;
            background-size: cover; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            width: 100%; max-width: 380px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4); transform: translateY(-20px);
        }

        .login-card img { width: 140px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px 15px; border: 1.5px solid #e2e8f0;
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; background: rgba(255, 255, 255, 0.5);
        }
        .btn-login {
            width: 100%; padding: 14px; background: #2563eb; color: white; border: none;
            border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; }
        
        @keyframes shake {
            0%, 100% {transform: translateX(0);}
            25% {transform: translateX(-8px);}
            75% {transform: translateX(8px);}
        }

        .main-footer { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); padding: 15px 0; }
    </style>
</head>
<body class="login-body">

    <div class="login-card">
        <img src="img/NexeSocial-logo.png" alt="Logo NexeSocial">
        <h2 style="color: #1e293b; margin-bottom: 8px;">Benvingut de nou</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Gestió d'usuaris centralitzada</p>
        
        <div class="input-group">
            <label>Correu Electrònic</label>
            <input type="email" id="userInput" placeholder="Ex: admin@nexesocial.com">
        </div>
        
        <div class="input-group">
            <label>Contrasenya</label>
            <input type="password" id="passInput" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="intentarLogin()">Accedir al Sistema</button>
        
        <p id="error-msg">⚠️ Credencials incorrectes o sense accés</p>

        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05);">
            <p style="font-size: 0.7rem; color: #64748b;">ACCÉS ADMIN: <b>admin@nexesocial.com</b> | PASS: <b>1234</b></p>
        </div>
    </div>

    <footer class="main-footer">
        <div style="display: flex; justify-content: space-around; font-size: 0.75rem; color: #475569;">
            <span>© 2026 NexeSocial</span>
            <span>Desenvolupat per <strong>Rafa Campos</strong></span>
        </div>
    </footer>

    <script src="database.js"></script>

    <script>
        function intentarLogin() {
            const email = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('error-msg');
            const card = document.querySelector('.login-card');

            // Usem la funció Auth que hem definit a database.js
            if (Auth.login(email, pass)) {
                // Si el login és correcte, anem a la Home
                window.location.href = 'home.html';
            } else {
                // Si falla, efecte de vibració
                error.style.display = 'block';
                card.style.animation = "shake 0.4s";
                setTimeout(() => { card.style.animation = ""; }, 400);
            }
        }

        // Permetre entrar amb la tecla Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') intentarLogin();
        });
    </script>
</body>
</html>
