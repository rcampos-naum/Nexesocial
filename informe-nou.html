<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>NexeSocial - Nou Informe Familiar</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <script src="database.js"></script>
    <style>
        .form-container {
            background: white; max-width: 800px; margin: 20px auto;
            padding: 30px; border-radius: 15px; border: 1px solid #e2e8f0;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #1e293b; font-size: 0.9rem; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-family: inherit; font-size: 1rem; transition: 0.2s;
        }
        input[readonly] { background-color: #f8fafc; color: #64748b; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .btn-flex { display: flex; align-items: center; gap: 8px; font-weight: 600; padding: 12px 24px; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; }

        /* Estils del Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <script src="sidebar.js"></script>

    <div id="modalConfirm" class="modal-overlay">
        <div class="modal-content">
            <h3>Confirmar l'enviament?</h3>
            <p>Es registrarà l'informe a l'expedient familiar oficial.</p>
            <div class="btn-group" style="justify-content: center;">
                <button class="btn-flex btn-primary" onclick="executarGuardat()">Confirmar</button>
                <button class="btn-flex btn-secondary" onclick="tancarModal('modalConfirm')">Enrere</button>
            </div>
        </div>
    </div>

    <div id="modalSuccess" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size: 3rem; color: #166534;">✓</div>
            <h3>Informe Guardat</h3>
            <p>L'informe s'ha numerat i arxivat correctament.</p>
        </div>
    </div>

    <main class="main-content">
        <div class="form-container">
            <div style="margin-bottom: 25px;">
                <h1 style="margin:0; font-size: 1.5rem;">Nou Informe Tècnic</h1>
                <p id="fam-display-name" style="color: #64748b; margin: 5px 0;">Carregant dades...</p>
            </div>

            <form id="formInforme" onsubmit="obrirConfirmacio(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Data de l'Informe</label>
                        <input type="date" id="data_informe" required>
                    </div>
                    <div class="form-group">
                        <label>Tipus d'Informe</label>
                        <select id="tipus_informe" required>
                            <option value="">Selecciona...</option>
                            <option value="Social">Informe Social</option>
                            <option value="Seguiment">Seguiment Trimestral</option>
                            <option value="Derivació">Proposta de Derivació</option>
                            <option value="Especialista">Informe Psicològic / Especialista</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tècnic Redactor (Usuari actiu)</label>
                    <input type="text" id="redactor" readonly required>
                </div>
                <div class="form-group">
                    <label>Títol / Assumpte</label>
                    <input type="text" id="titol" placeholder="Ex: Valoració de la situació d'habitatge" required>
                </div>
                <div class="form-group">
                    <label>Contingut de l'Informe</label>
                    <textarea id="contingut" rows="10" placeholder="Escriu aquí el detall de la intervenció..."></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-flex btn-primary">Guardar Informe</button>
                    <button type="button" class="btn-flex btn-secondary" onclick="window.history.back()">Cancel·lar</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const famId = params.get('famId');
        
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Assignar data actual
            document.getElementById('data_informe').valueAsDate = new Date();
            
            // 2. Llegir usuari loguejat del localStorage
            const usuariLoguejat = localStorage.getItem('userLoged') || "Tècnic No Identificat";
            document.getElementById('redactor').value = usuariLoguejat;

            // 3. Carregar dades de la família
            const familia = BBDD.families.find(f => f.id === famId);
            if(familia) {
                document.getElementById('fam-display-name').innerText = `Família: ${familia.cognoms_referencia} (${familia.id})`;
            }
        });

        function obrirConfirmacio(e) {
            e.preventDefault();
            document.getElementById('modalConfirm').style.display = 'flex';
        }

        function tancarModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function executarGuardat() {
            tancarModal('modalConfirm');
            
            const nouInforme = {
                id: "INF-" + Date.now(),
                familiaId: famId,
                data: document.getElementById('data_informe').value,
                tipus: document.getElementById('tipus_informe').value,
                redactor: document.getElementById('redactor').value,
                titol: document.getElementById('titol').value,
                contingut: document.getElementById('contingut').value
            };

            const informesExistent = JSON.parse(localStorage.getItem('nexe_informes')) || [];
            informesExistent.push(nouInforme);
            localStorage.setItem('nexe_informes', JSON.stringify(informesExistent));

            document.getElementById('modalSuccess').style.display = 'flex';

            setTimeout(() => {
                window.location.href = `familia-perfil.html?id=${famId}`;
            }, 1500);
        }
    </script>
</body>
</html>
