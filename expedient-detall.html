<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexeSocial - Llistat d'Expedients</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <script src="database.js"></script>
    
    <style>
        .header-actions { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 25px;
            flex-wrap: wrap; gap: 15px;
        }
        
        .title-section h1 { margin: 0; font-size: 1.8rem; color: #1e293b; }
        .title-section p { margin: 5px 0 0 0; color: #64748b; font-size: 1rem; }

        .btn-nou { 
            background: #10b981; 
            color: white; border: none; 
            padding: 12px 24px; border-radius: 10px; 
            cursor: pointer; font-weight: 700; 
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .btn-nou:hover { background: #059669; transform: translateY(-2px); }

        .search-container {
            background: white; padding: 20px;
            border-radius: 12px; border: 1px solid #e2e8f0;
            margin-bottom: 25px; display: flex;
            justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px;
        }

        .search-bar { 
            padding: 12px 15px; border-radius: 8px; 
            border: 1px solid #e2e8f0; width: 100%; max-width: 400px; 
            font-size: 0.95rem; outline-color: var(--primary-blue);
        }

        .table-container { 
            background: white; border-radius: 12px; 
            border: 1px solid #e2e8f0; overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { 
            text-align: left; padding: 15px; 
            background: #f8fafc; color: #64748b; 
            font-size: 0.75rem; text-transform: uppercase; 
            letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; 
        }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-size: 0.95rem; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-actiu { background: #dcfce7; color: #15803d; }
        .status-baixa { background: #fee2e2; color: #b91c1c; }
        .status-espera { background: #fef3c7; color: #92400e; }

        .btn-veure {
            background: #2563eb; color: white;
            border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-veure:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <script src="sidebar.js"></script>

    <main class="main-content">
        <div class="header-actions">
            <div class="title-section">
                <h1>Expedients Socials</h1>
                <p>Gestió centralitzada d'usuaris de NexeSocial</p>
            </div>
            <button class="btn-nou" onclick="window.location.href='perfil-usuari.html?id=nou'">
                <span>+</span> Nou Expedient
            </button>
        </div>

        <div class="search-container">
            <input type="text" id="buscador" class="search-bar" placeholder="Cerca per nom o DNI..." onkeyup="filtrarTaula()">
            <div style="color: #64748b; font-size: 0.9rem;">
                Total: <strong id="count">0</strong> expedients actius
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Codi</th>
                        <th>Nom i Cognoms</th>
                        <th>DNI / NIE</th>
                        <th>Estat</th>
                        <th>Responsable</th>
                        <th style="text-align:right;">Gestió</th>
                    </tr>
                </thead>
                <tbody id="taula-cos">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // Funció per carregar i dibuixar la taula
        function carregarTaula(dades) {
            // 1. Assegurem que dades té contingut de BBDD si no ens passen res
            const llista = dades || BBDD.expedients;
            const tbody = document.getElementById('taula-cos');
            tbody.innerHTML = "";

            if (llista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:#94a3b8;">No s'han trobat expedients.</td></tr>`;
                document.getElementById('count').innerText = "0";
                return;
            }

            llista.forEach(u => {
                const fila = document.createElement('tr');
                
                let estatClase = 'status-actiu';
                if(u.estat === 'Baixa') estatClase = 'status-baixa';
                if(u.estat === "Llista d'Espera") estatClase = 'status-espera';

                fila.innerHTML = `
                    <td style="font-weight:700; color:#2563eb;">${u.id}</td>
                    <td><b>${u.nom} ${u.cognoms || ''}</b></td>
                    <td style="font-family: monospace;">${u.dni}</td>
                    <td>
                        <span class="status-pill ${estatClase}">
                            ${u.estat || 'Actiu'}
                        </span>
                    </td>
                    <td><small>${u.treballador || 'Sense assignar'}</small></td>
                    <td style="text-align:right;">
                        <button class="btn-veure" onclick="window.location.href='perfil-usuari.html?id=${u.id}'">
                            👁️ Fitxa
                        </button>
                    </td>
                `;
                tbody.appendChild(fila);
            });
            
            document.getElementById('count').innerText = llista.length;
        }

        // Funció de cerca en temps real
        function filtrarTaula() {
            const text = document.getElementById('buscador').value.toLowerCase();
            const filtrats = BBDD.expedients.filter(u => 
                u.nom.toLowerCase().includes(text) || 
                (u.cognoms && u.cognoms.toLowerCase().includes(text)) ||
                u.dni.toLowerCase().includes(text) ||
                u.id.toLowerCase().includes(text)
            );
            carregarTaula(filtrats);
        }

        // 2. Canvi clau: Esperem a DOMContentLoaded per assegurar que database.js ha carregat
        document.addEventListener('DOMContentLoaded', () => {
            // El database.js carrega dades automàticament. Només hem de dibuixar.
            carregarTaula();
        });
    </script>
</body>
</html>
