<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>NexeSocial - Llistat d'Expedients</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <style>
        .header-actions { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 25px; 
        }
        
        .title-section h1 { margin: 0; font-size: 1.8rem; color: #1e293b; }
        .title-section p { margin: 5px 0 0 0; color: #64748b; font-size: 1rem; }

        .btn-nou { 
            background: #10b981; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar { 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            width: 400px; 
            font-size: 0.95rem;
        }

        .table-container { 
            background: white; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 15px; 
            background: #ffffff; 
            color: #64748b; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0; 
        }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-actiu { background: #dcfce7; color: #15803d; }
        .status-baixa { background: #fee2e2; color: #b91c1c; }

        .btn-veure {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <script src="sidebar.js"></script>

    <main class="main-content">
        <div class="header-actions">
            <div class="title-section">
                <h1>Expedients</h1>
                <p>Gestió d'usuaris i seguiment social</p>
            </div>
            <button class="btn-nou" onclick="window.location.href='perfil-usuari.html?id=nou'">
                <span>+</span> Nou Usuari
            </button>
        </div>

        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Cerca per nom o DNI...">
            <div style="color: #64748b; font-size: 0.9rem;">
                Mostrant <strong id="count">3</strong> expedients
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Codi Expedient</th>
                        <th>Nom i Cognoms</th>
                        <th>DNI / NIE</th>
                        <th>Estat</th>
                        <th>Accions</th>
                    </tr>
                </thead>
                <tbody id="taula-cos">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // Dades de mostra basades en la teva captura
        const usuarisDB = [
            { id: "0042", nom: "Joan Garcia Pons", dni: "43215678X", estat: "Actiu", any: "2026" },
            { id: "0045", nom: "Maria Rodríguez Beltran", dni: "45889211S", estat: "Actiu", any: "2026" },
            { id: "0891", nom: "Pere Mascaró Esteva", dni: "41552300M", estat: "Baixa", any: "2025" }
        ];

        function carregarTaula() {
            const tbody = document.getElementById('taula-cos');
            tbody.innerHTML = "";

            usuarisDB.forEach(u => {
                const fila = document.createElement('tr');
                
                fila.innerHTML = `
                    <td style="font-weight:700;">EXP-${u.any}-${u.id}</td>
                    <td>${u.nom}</td>
                    <td>${u.dni}</td>
                    <td>
                        <span class="status-pill ${u.estat === 'Actiu' ? 'status-actiu' : 'status-baixa'}">
                            ${u.estat}
                        </span>
                    </td>
                    <td>
                        <button class="btn-veure" onclick="window.location.href='perfil-usuari.html?id=${u.id}'">
                            👁️ Veure Fitxa
                        </button>
                    </td>
                `;
                tbody.appendChild(fila);
            });
            
            document.getElementById('count').innerText = usuarisDB.length;
        }

        document.addEventListener('DOMContentLoaded', carregarTaula);
    </script>
</body>
</html>
