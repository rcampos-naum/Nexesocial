<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexeSocial - Llistat d'Expedients</title>
    <link rel="stylesheet" href="style-dashboard.css">
    <script src="database.js"></script>
    
    <style>
        .header-actions { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            margin-bottom: 25px; flex-wrap: wrap; gap: 15px;
        }
        .title-section h1 { margin: 0; font-size: 1.8rem; color: #1e293b; }
        .title-section p { margin: 5px 0 0 0; color: #64748b; font-size: 1rem; }

        .btn-nou { 
            background: #10b981; color: white; border: none; padding: 12px 24px; 
            border-radius: 10px; cursor: pointer; font-weight: 700; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-nou:hover { background: #059669; transform: translateY(-2px); }

        .search-container {
            background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;
            margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px;
        }
        .search-bar { 
            padding: 12px 15px; border-radius: 8px; border: 1px solid #e2e8f0; 
            width: 100%; max-width: 400px; font-size: 0.95rem; outline-color: #2563eb;
        }

        .table-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { 
            text-align: left; padding: 15px; background: #f8fafc; color: #64748b; 
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; 
        }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-size: 0.95rem; }
        
        /* Fila clicable */
        tbody tr { cursor: pointer; transition: 0.2s; }
        tbody tr:hover { background-color: #f8faff; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
        .badge-menor { background: #dcfce7; color: #166534; }
        .badge-adult { background: #e0f2fe; color: #075985; }
        .exp-num { font-family: monospace; font-weight: 800; color: #2563eb; }

        .vincle-mini {
            display: inline-block; background: #f1f5f9; padding: 2px 6px;
            border-radius: 4px; font-size: 0.75rem; margin-right: 4px;
            color: #475569; border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <script src="sidebar.js"></script>

    <main class="main-content">
        <div class="header-actions">
            <div class="title-section">
                <h1>Expedients Socials</h1>
                <p>Gestió centralitzada d'usuaris i unitats familiars</p>
            </div>
            <button class="btn-nou" onclick="anarAlta()">
                <span>+</span> Nou Registre Únic
            </button>
        </div>

        <div class="search-container">
            <div style="display:flex; gap:10px; flex-grow:1;">
                <input type="text" id="buscador" class="search-bar" placeholder="Cerca per nom, DNI o nº d'expedient..." onkeyup="filtrarTaula()">
                <select id="filtre-tipus" class="search-bar" style="max-width:150px;" onchange="filtrarTaula()">
                    <option value="tots">Tots els perfils</option>
                    <option value="menor">Menors</option>
                    <option value="adult">Adults</option>
                </select>
            </div>
            <div style="color: #64748b; font-size: 0.9rem;">
                Total: <strong id="count">0</strong> registres
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nº EXPEDIENT</th>
                        <th>Nom i Cognoms</th>
                        <th>DNI / NIE</th>
                        <th>Perfil</th>
                        <th>Unitat Familiar</th>
                    </tr>
                </thead>
                <tbody id="taula-cos"></tbody>
            </table>
        </div>
    </main>

    <script>
        function carregarTaula(dadesFiltrades) {
            let llista = dadesFiltrades || JSON.parse(localStorage.getItem('nexe_persones')) || BBDD.expedients;
            const tbody = document.getElementById('taula-cos');
            tbody.innerHTML = "";

            if (llista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#94a3b8;">No s'han trobat expedients.</td></tr>`;
                document.getElementById('count').innerText = "0";
                return;
            }

            llista.forEach(u => {
                const fila = document.createElement('tr');
                // Redirecció a perfil-usuari.html al fer clic a la fila
                fila.onclick = () => window.location.href = `perfil-usuari.html?id=${u.id}`;
                
                let vinclesHTML = u.vincles_detallats?.length > 0 
                    ? u.vincles_detallats.map(v => `<span class="vincle-mini">${v.nom.split(' ')[0]} (${v.relacio})</span>`).join('')
                    : `<small style="color:#cbd5e1;">Sense vincles</small>`;

                fila.innerHTML = `
                    <td><span class="exp-num">${u.id}</span></td>
                    <td><b>${u.nom} ${u.cognoms || ''}</b></td>
                    <td style="font-family: monospace;">${u.dni || '---'}</td>
                    <td>
                        <span class="badge badge-${u.tipus || 'adult'}">
                            ${u.tipus === 'menor' ? '👶 Menor' : '👤 Adult'}
                        </span>
                    </td>
                    <td>${vinclesHTML}</td>
                `;
                tbody.appendChild(fila);
            });
            document.getElementById('count').innerText = llista.length;
        }

        function filtrarTaula() {
            const text = document.getElementById('buscador').value.toLowerCase();
            const tipusFiltre = document.getElementById('filtre-tipus').value;
            const totes = JSON.parse(localStorage.getItem('nexe_persones')) || BBDD.expedients;
            
            const filtrats = totes.filter(u => {
                const nomComplet = (u.nom + " " + (u.cognoms || "")).toLowerCase();
                const coincideixText = nomComplet.includes(text) || (u.dni?.toLowerCase().includes(text)) || u.id.toLowerCase().includes(text);
                const coincideixTipus = (tipusFiltre === 'tots') || (u.tipus === tipusFiltre);
                return coincideixText && coincideixTipus;
            });
            carregarTaula(filtrats);
        }

        function anarAlta() { window.location.href = 'perfil-usuari.html?id=nou'; }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('nexe_persones')) {
                const demoData = [
                    { id: "U2026/01", nom: "Maria", cognoms: "Sánchez", dni: "12345678A", tipus: "adult", vincles_detallats: [] },
                    { id: "U2026/02", nom: "Pol", cognoms: "Sánchez", dni: "---", tipus: "menor", vincles_detallats: [{nom: "Maria", relacio: "Mare"}] }
                ];
                localStorage.setItem('nexe_persones', JSON.stringify(demoData));
            }
            carregarTaula();
        });
    </script>
</body>
</html>
