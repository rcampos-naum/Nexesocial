<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexePsy - Suite Psicosocial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background-color: #f8fafc; color: #1e293b; 
            font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; 
        }

        .main-content {
            flex-grow: 1;
            margin-left: 280px; 
            padding: 40px 60px;
            max-width: 100%;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.collapsed .main-content {
            margin-left: 85px;
        }

        .search-container { margin-bottom: 35px; position: relative; display: flex; gap: 10px; max-width: 800px; }
        .search-input { 
            flex-grow: 1; padding: 16px 20px 16px 50px; border-radius: 18px; border: 2px solid #e2e8f0;
            background: white; font-size: 1rem; outline: none; transition: 0.2s;
        }
        .search-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; margin-bottom: 80px; }
        .case-card { 
            background: white; border-radius: 28px; padding: 35px; 
            border: 1px solid #e2e8f0; transition: 0.3s; position: relative;
            display: flex; flex-direction: column;
        }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); border-color: #6366f1; }
        .case-id { font-size: 0.75rem; font-weight: 800; color: #6366f1; margin-bottom: 10px; text-transform: uppercase; }
        .case-card h3 { font-size: 1.5rem; margin: 0 0 15px; font-weight: 800; color: #0f172a; letter-spacing: -0.03em; }
        .case-card p { color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; flex-grow: 1; }

        .btn-nexe-sm { 
            display: inline-flex !important;
            align-items: center; 
            justify-content: center;
            padding: 14px 24px; 
            border-radius: 15px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-decoration: none !important;
            text-align: center;
        }

        .btn-psy-primary { background: #6366f1 !important; color: white !important; }
        .btn-psy-secondary { background: #f1f5f9 !important; color: #475569 !important; }
        .btn-psy-dark { background: #0f172a !important; color: white !important; }
        
        .btn-nexe-sm:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .main-content { margin-left: 0 !important; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
            <div>
                <span style="color: #6366f1; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Gestió de Casos</span>
                <h1 style="font-size: 2.8rem; font-weight: 800; margin: 8px 0 0; letter-spacing: -0.05em; color: #0f172a;">Seguiment Actiu</h1>
            </div>
            <button onclick="alert('Funcionalitat en desenvolupament')" class="btn-nexe-sm btn-psy-dark">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" stroke-width="3" style="margin-right: 8px;"><path d="M12 4v16m8-8H4" stroke-linecap="round"/></svg>
                Nova Alta
            </button>
        </header>

        <div class="search-container">
            <svg class="search-icon" width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/></svg>
            <input type="text" id="mainSearch" class="search-input" placeholder="Cerca cognoms o expedient..." onkeyup="filtrarCasos()">
        </div>

        <div class="case-grid" id="caseContainer"></div>
    </main>

    <script src="sidebar-nexepsy.js"></script>

    <script>
        const BBDD_PSICO = {
            families: [
                { id: "EXP-2024-001", cognoms: "García Martí", obs: "Seguiment de dinàmiques de comunicació post-trauma i suport emocional continu." },
                { id: "EXP-2024-002", cognoms: "Sánchez Pérez", obs: "Pendent d'avaluació inicial del nucli de convivència i mapping de xarxa social." },
                { id: "EXP-2024-003", cognoms: "Rodríguez López", obs: "Intervenció sistèmica en curs. Treballant límits i rols familiars." },
                { id: "EXP-2024-004", cognoms: "Fernández Belmonte", obs: "Situació d'alta vulnerabilitat. Coordinació amb serveis educatius." }
            ]
        };

        function prepararAcceso(id, cognoms) {
            // Guardamos datos básicos en localStorage para que el editor de informes los recoja
            const data = {
                id: id,
                apellidos: cognoms,
                tecnico: "Professional de NexePsy"
            };
            localStorage.setItem('familia_data', JSON.stringify(data));
        }

        function cargarCasos(filtro = "") {
            const container = document.getElementById('caseContainer');
            if (!container) return;
            
            container.innerHTML = "";
            
            const filtrados = BBDD_PSICO.families.filter(f => 
                f.cognoms.toLowerCase().includes(filtro.toLowerCase()) || 
                f.id.toLowerCase().includes(filtro.toLowerCase())
            );
            
            filtrados.forEach(f => {
                const card = document.createElement('div');
                card.className = 'case-card';
                card.innerHTML = `
                    <span class="case-id">${f.id}</span>
                    <h3>Família ${f.cognoms}</h3>
                    <p>${f.obs}</p>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <a href="informe-psicosocial.html?famId=${f.id}&name=${encodeURIComponent(f.cognoms)}" 
                           onclick="prepararAcceso('${f.id}', '${f.cognoms}')"
                           class="btn-nexe-sm btn-psy-primary">
                            Nou Informe
                        </a>
                        <a href="genograma_editor.html?famId=${f.id}" 
                           class="btn-nexe-sm btn-psy-secondary">
                            Genograma
                        </a>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filtrarCasos() { 
            const val = document.getElementById('mainSearch').value;
            cargarCasos(val); 
        }

        window.addEventListener('load', () => {
            cargarCasos();
        });
    </script>
</body>
</html>
