<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadístiques - NexePsy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background-color: #f8fafc; color: #1e293b; 
            font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; 
        }

        .main-content {
            flex-grow: 1;
            margin-left: 280px; 
            padding: 40px 60px;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.collapsed .main-content { margin-left: 85px; }

        /* HEADER & BOTONES */
        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
        }

        .btn-psy-primary {
            display: inline-flex; align-items: center; gap: 10px;
            background: #6366f1; color: white; padding: 14px 24px;
            border-radius: 15px; font-weight: 700; text-decoration: none;
            transition: 0.2s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn-psy-primary:hover { transform: translateY(-2px); opacity: 0.9; }

        /* DASHBOARD MOCKUP */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .stat-card {
            background: white; padding: 25px; border-radius: 20px;
            border: 1px solid #e2e8f0;
        }

        .stat-card h4 { margin: 0; color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 10px 0; }

        .chart-placeholder {
            background: white; border-radius: 28px; border: 1px solid #e2e8f0;
            padding: 40px; min-height: 400px; display: flex; align-items: center;
            justify-content: center; color: #94a3b8; flex-direction: column;
            gap: 15px;
        }

        @media (max-width: 768px) { .main-content { margin-left: 0 !important; padding: 20px; } }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <header class="page-header">
            <div>
                <span style="color: #6366f1; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Anàlisi de Dades</span>
                <h1 style="font-size: 2.8rem; font-weight: 800; margin: 8px 0 0; letter-spacing: -0.05em; color: #0f172a;">Estadístiques</h1>
            </div>
            
            <a href="nexepsy-estadisticas-informe.html" class="btn-psy-primary">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Generar Informe Anual
            </a>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h4>Total Expedients</h4>
                <div class="value">124</div>
            </div>
            <div class="stat-card">
                <h4>Intervencions Actives</h4>
                <div class="value">42</div>
            </div>
            <div class="stat-card">
                <h4>Informes Generats</h4>
                <div class="value">856</div>
            </div>
        </section>

        <div class="chart-placeholder">
            <svg width="64" height="64" fill="none" stroke="#e2e8f0" viewBox="0 0 24 24" stroke-width="1.5"><path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></svg>
            <p>El panell de visualització de gràfics es carregarà en completar la recollida de dades.</p>
        </div>
    </main>

    <script src="sidebar-nexepsy.js"></script>

</body>
</html>
