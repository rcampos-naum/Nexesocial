<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>NexeSocial - Inici</title>
    <link rel="stylesheet" href="style-dashboard.css">
</head>
<body>
    <script src="sidebar.js"></script>

    <main class="main-content">
        <section class="welcome-section" style="text-align: center; padding: 40px;">
            <h1 style="font-size: 2.5rem; color: #1e293b;">Bon dia, Equip Nexe!</h1>
            <p style="color: #64748b; margin-bottom: 40px;">Quina àrea vols gestionar avui?</p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 800px; margin: 0 auto;">
                <div class="content-card" onclick="window.location.href='expedient-detall.html'" style="cursor:pointer; padding: 40px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; transition: 0.3s;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">👤</div>
                    <h2>Expedients Individuals</h2>
                    <p>Cerca usuaris i fitxes personals</p>
                </div>
                
                <div class="content-card" onclick="window.location.href='programes-gestio.html'" style="cursor:pointer; padding: 40px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; transition: 0.3s;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">📋</div>
                    <h2>Gestió de Programes</h2>
                    <p>Accedeix a tots els programes i projectes</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-firma">
        <span>© 2026 NexeSocial - Sistema de Gestió</span>
    </footer>
    <script src="database.js"></script>
</body>
</html>
