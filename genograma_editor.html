<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Genograma - NexePsy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --psy-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --nexe-bg: #f1f5f9;
            --nexe-dark: #0f172a;
            --sidebar-w: 380px;
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--nexe-bg); overflow: hidden; }

        .app-wrapper { display: flex; height: 100vh; }

        /* --- SIDEBAR --- */
        .config-sidebar {
            width: var(--sidebar-w); background: white; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.02); z-index: 10;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #f1f5f9; }
        .scroll-content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        h2 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin: 20px 0 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group { margin-bottom: 10px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #475569; margin-bottom: 3px; }
        input, select { 
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; 
            background: #f8fafc; font-size: 0.8rem; font-family: inherit;
        }

        .btn-main {
            width: 100%; padding: 12px; background: var(--psy-gradient); color: white;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 5px;
        }

        /* --- CANVAS & GRID --- */
        .canvas-area { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 20px; background: #cbd5e1; }
        
        #genogram-stage { 
            background-color: white;
            background-image: 
                linear-gradient(#f1f5f9 1px, transparent 1px),
                linear-gradient(90deg, #f1f5f9 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 2px, transparent 2px),
                linear-gradient(#e2e8f0 2px, transparent 2px);
            background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: crosshair; 
        }

        .bottom-toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 6px; border-radius: 100px; display: flex; gap: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .tool-item {
            padding: 8px 15px; border-radius: 100px; border: none; background: transparent;
            font-size: 0.65rem; font-weight: 700; color: #64748b; cursor: pointer;
        }
        .tool-item.active { background: var(--nexe-dark); color: white; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 380px; text-align: center; }
        .modal-icon { width: 50px; height: 50px; margin: 0 auto 15px; color: #f59e0b; }
        .btn-modal { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; flex: 1; }

        .edit-badge { position: absolute; top: 15px; right: 15px; background: #6366f1; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; display: none; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <aside class="config-sidebar">
            <div class="sidebar-header">
                <button class="btn-main" style="background: #f1f5f9; color: #64748b; margin-bottom: 10px;" onclick="mostrarModal()">← Tornar</button>
                <h1 style="font-size: 1.1rem; font-weight: 800; margin:0;">Editor de Genograma</h1>
            </div>
            
            <div class="scroll-content">
                <h2 id="formTitle">Nou Membre</h2>
                <div class="form-grid">
                    <div class="input-group full"><label>Nom i Cognoms</label><input type="text" id="nodeName"></div>
                    <div class="input-group full">
                        <label>Data Naixement (DD/MM/AAAA)</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="birthDay" placeholder="DD" oninput="calcularEdadExacta()">
                            <input type="number" id="birthMonth" placeholder="MM" oninput="calcularEdadExacta()">
                            <input type="number" id="birthYear" placeholder="AAAA" oninput="calcularEdadExacta()">
                        </div>
                    </div>
                    <div class="input-group"><label>Edat Actual</label><input type="text" id="nodeAge" readonly style="background:#e2e8f0"></div>
                    <div class="input-group">
                        <label>Símbol</label>
                        <select id="nodeType">
                            <option value="male">Home</option><option value="female">Dona</option>
                            <option value="ip_male">P. Principal (H)</option><option value="ip_female">P. Principal (D)</option>
                            <option value="preg">Embaràs</option><option value="pet">Mascota</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Estat Vital</label>
                        <select id="nodeDead"><option value="no">Viu</option><option value="yes">Difunt (X)</option></select>
                    </div>
                    <div class="input-group full"><label>Social / Salut</label><input type="text" id="nodeSocial"></div>
                </div>
                <button id="btnSave" class="btn-main" onclick="guardarMiembro()">Afegir al Mapa</button>
                <button id="btnCancelEdit" class="btn-main" style="background:#94a3b8; display:none;" onclick="cancelarEdicion()">Cancel·lar Edició</button>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #f1f5f9;">
                <button class="btn-main" style="background: #0f172a;" onclick="abrirExportar()">Exportar Genograma</button>
            </div>
        </aside>

        <main class="canvas-area">
            <div class="edit-badge" id="editBadge">MODRE EDICIÓ ACTIU</div>
            <canvas id="genogram-stage" width="900" height="700"></canvas>
            
            <nav class="bottom-toolbar">
                <button class="tool-item active" onclick="setTool('select', this)">Selecció / Editar</button>
                <button class="tool-item" onclick="setTool('line_mat', this)">Matrimoni</button>
                <button class="tool-item" onclick="setTool('line_child', this)">Fill</button>
                <button class="tool-item" onclick="setTool('line_conflict', this)" style="color:#ef4444">Conflicte</button>
            </nav>
        </main>
    </div>

    <div class="modal-overlay" id="exitModal">
        <div class="modal-content">
            <div class="modal-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>
            <div class="modal-title">Canvis sense guardar</div>
            <div class="modal-text">Si surts ara perdràs el disseny actual.</div>
            <div class="modal-btns" style="display:flex; gap:10px;">
                <button class="btn-modal" style="background:#f1f5f9" onclick="cerrarModal()">Tornar</button>
                <button class="btn-modal" style="background:#ef4444; color:white" onclick="window.location.href=rutaSuite">Sortir</button>
            </div>
        </div>
    </div>

    <script src="js/bbdd.js"></script>
    <script>
        const canvas = document.getElementById('genogram-stage');
        const ctx = canvas.getContext('2d');
        let nodes = []; let links = [];
        let currentTool = 'select';
        let isChanged = false;
        let selectedNode = null;
        const rutaSuite = 'nexepsy.html';

        // --- CONEXIÓ AUTOMÀTICA BBDD ---
        const params = new URLSearchParams(window.location.search);
        const idFam = params.get('id_familia');
        const tec = params.get('tecnico') || "Tècnic no assignat";

        window.onload = function() {
            if (idFam && typeof BBDD !== 'undefined') {
                const familia = BBDD.families.find(f => f.id === idFam);
                if (familia) {
                    // Desa dades de capçalera per a l'exportació
                    localStorage.setItem('familia_data', JSON.stringify({
                        id: familia.id,
                        apellidos: (familia.cognoms_referencia || familia.cognoms || "").replace(/-/g, ' '),
                        tecnico: tec
                    }));
                    importarMembres(familia.membres);
                }
            }
            render();
        };

        function importarMembres(membres) {
            membres.forEach((m, i) => {
                let d = "", mon = "", y = "";
                if(m.data_naixement && m.data_naixement.includes('/')) {
                    const parts = m.data_naixement.split('/');
                    d = parts[0]; mon = parts[1]; y = parts[2];
                } else if (m.data_naixement && m.data_naixement.includes('-')) {
                    const parts = m.data_naixement.split('-');
                    y = parts[0]; mon = parts[1]; d = parts[2];
                }

                nodes.push({
                    id: Date.now() + i,
                    name: m.nom || "Membre",
                    day: d, month: mon, year: y,
                    age: calcularEdadBase(d, mon, y),
                    type: (m.rol === 'Pare' || m.rol === 'Fill') ? 'male' : 'female',
                    dead: 'no',
                    social: m.instruccions || '',
                    x: 150 + (i * 120), y: 250 + (i % 2 * 50)
                });
            });
        }

        function calcularEdadBase(d, m, y) {
            if(!y || y < 1900) return "";
            const birth = new Date(y, m - 1, d);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
            return age >= 0 ? age : "";
        }

        function setTool(tool, btn) {
            currentTool = tool;
            document.querySelectorAll('.tool-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function calcularEdadExacta() {
            const d = document.getElementById('birthDay').value;
            const m = document.getElementById('birthMonth').value;
            const y = document.getElementById('birthYear').value;
            document.getElementById('nodeAge').value = calcularEdadBase(d, m, y);
        }

        function guardarMiembro() {
            const data = {
                name: document.getElementById('nodeName').value || "Sense Nom",
                day: document.getElementById('birthDay').value,
                month: document.getElementById('birthMonth').value,
                year: document.getElementById('birthYear').value,
                age: document.getElementById('nodeAge').value,
                type: document.getElementById('nodeType').value,
                dead: document.getElementById('nodeDead').value,
                social: document.getElementById('nodeSocial').value
            };

            if(selectedNode) {
                Object.assign(selectedNode, data);
                cancelarEdicion();
            } else {
                nodes.push({...data, id: Date.now(), x: 450, y: 350});
            }
            isChanged = true; resetForm(); render();
        }

        function resetForm() {
            ['nodeName','birthDay','birthMonth','birthYear','nodeAge','nodeSocial'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('nodeType').value = "male";
            document.getElementById('nodeDead').value = "no";
        }

        function cargarDatosEdicion(node) {
            selectedNode = node;
            document.getElementById('nodeName').value = node.name;
            document.getElementById('birthDay').value = node.day;
            document.getElementById('birthMonth').value = node.month;
            document.getElementById('birthYear').value = node.year;
            document.getElementById('nodeAge').value = node.age;
            document.getElementById('nodeType').value = node.type;
            document.getElementById('nodeDead').value = node.dead;
            document.getElementById('nodeSocial').value = node.social;
            
            document.getElementById('formTitle').innerText = "Editant Membre";
            document.getElementById('btnSave').innerText = "Guardar Canvis";
            document.getElementById('btnCancelEdit').style.display = "block";
            document.getElementById('editBadge').style.display = "block";
        }

        function cancelarEdicion() {
            selectedNode = null;
            resetForm();
            document.getElementById('formTitle').innerText = "Nou Membre";
            document.getElementById('btnSave').innerText = "Afegir al Mapa";
            document.getElementById('btnCancelEdit').style.display = "none";
            document.getElementById('editBadge').style.display = "none";
            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            links.forEach(l => {
                ctx.beginPath(); 
                ctx.strokeStyle = (l.type === 'line_conflict') ? '#ef4444' : '#1e293b';
                ctx.lineWidth = 2; 
                ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); 
                ctx.stroke();
            });
            nodes.forEach(n => {
                ctx.save(); ctx.translate(n.x, n.y);
                ctx.strokeStyle = (selectedNode === n) ? "#6366f1" : "#1e293b";
                ctx.lineWidth = (selectedNode === n) ? 4 : 2;
                ctx.beginPath();
                if(n.type.includes('male')) ctx.strokeRect(-20, -20, 40, 40);
                else if(n.type.includes('female')) { ctx.arc(0,0,20,0,Math.PI*2); ctx.stroke(); }
                if(n.dead === 'yes') { 
                    ctx.beginPath(); ctx.lineWidth = 2;
                    ctx.moveTo(-15,-15); ctx.lineTo(15,15); ctx.moveTo(15,-15); ctx.lineTo(-15,15); 
                    ctx.stroke(); 
                }
                ctx.fillStyle = "#1e293b"; ctx.textAlign = "center"; ctx.font = "bold 10px Inter";
                ctx.fillText(n.age, 0, 4); 
                ctx.font = "600 11px Inter";
                ctx.fillText(n.name, 0, 35);
                ctx.restore();
            });
        }

        let isDragging = false; let startX, startY;
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            const target = nodes.find(n => Math.hypot(n.x - x, n.y - y) < 30);
            if(currentTool === 'select' && target) {
                cargarDatosEdicion(target); isDragging = true;
            } else if(currentTool !== 'select') {
                startX = x; startY = y;
            }
            render();
        });

        canvas.addEventListener('mousemove', e => {
            if(!isDragging || !selectedNode) return;
            const rect = canvas.getBoundingClientRect();
            selectedNode.x = e.clientX - rect.left;
            selectedNode.y = e.clientY - rect.top;
            render();
        });

        canvas.addEventListener('mouseup', e => {
            if(currentTool !== 'select' && !isDragging) {
                const rect = canvas.getBoundingClientRect();
                links.push({x1: startX, y1: startY, x2: e.clientX - rect.left, y2: e.clientY - rect.top, type: currentTool});
                render();
            }
            isDragging = false;
        });

        window.addEventListener('keydown', e => {
            if((e.key === "Delete" || e.key === "Backspace") && selectedNode) {
                nodes = nodes.filter(n => n !== selectedNode);
                cancelarEdicion();
            }
        });

        function abrirExportar() {
            selectedNode = null; render();
            const dataUrl = canvas.toDataURL("image/png");
            localStorage.setItem('genograma_temp', dataUrl);
            window.open('genograma-export.html', '_blank');
        }

        function mostrarModal() { document.getElementById('exitModal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('exitModal').style.display = 'none'; }
    </script>
</body>
</html>
