<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar Genograma - NexePsy Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --psy-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --nexe-dark: #0f172a;
            --slate-500: #64748b;
            --slate-200: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            margin: 0; 
            padding: 50px 20px 100px 20px; 
            color: var(--nexe-dark);
        }

        .export-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            position: relative;
            border: 1px solid var(--slate-200);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f1f5f9;
        }

        .brand-logos { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 45px; object-fit: contain; }
        .divider { width: 2px; height: 40px; background: var(--slate-200); }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .meta-item {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--slate-200);
        }

        .meta-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        .meta-value {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--nexe-dark);
        }

        .genogram-preview-box {
            background: #ffffff;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 40px;
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imgPreview {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .footer-financiadores {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            text-align: left;
        }
        .financiadores-grid {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .financiador-logo {
            height: 40px;
            max-width: 120px;
            object-fit: contain;
        }

        .floating-action-bar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .float-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-float-back { background: white; color: var(--nexe-dark); border: 1px solid var(--slate-200); }
        .btn-float-main { background: var(--psy-gradient); color: white; }
        .float-btn:hover { transform: scale(1.1); }

        .download-options {
            position: absolute;
            bottom: 75px;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 200px;
            border: 1px solid var(--slate-200);
        }
        .download-options.active { display: flex; animation: slideUp 0.3s ease; }

        .opt-item {
            padding: 12px 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--nexe-dark);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .opt-item:hover { background: #f1f5f9; color: #6366f1; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media print {
            .floating-action-bar { display: none; }
            body { padding: 0; background: white; }
            .export-container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="export-container" id="printArea">
        <header class="report-header">
            <div class="brand-logos">
                <img src="img/NexeSocial-logo.png" id="logo1" class="logo-img" alt="NexeSocial">
                <div class="divider"></div>
                <img src="img/NexePsy.svg" id="logo2" class="logo-img" alt="NexePsy">
            </div>
            <div style="text-align: right">
                <div style="font-weight: 800; font-size: 1.2rem; color: #1e293b;">INFORME GENOGRAMA</div>
                <div style="color: #6366f1; font-weight: 700; font-size: 0.75rem;">NexePsy Suite v2026</div>
            </div>
        </header>

        <div class="meta-grid">
            <div class="meta-item">
                <span class="meta-label">ID FAMÍLIA</span>
                <span class="meta-value" id="valID">---</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">COGNOMS REF.</span>
                <span class="meta-value" id="valFam">---</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">TÈCNIC RESPONSABLE</span>
                <span class="meta-value" id="valTec">---</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">DATA EMISSIÓ</span>
                <span class="meta-value" id="valDate">---</span>
            </div>
        </div>

        <div class="genogram-preview-box">
            <img id="imgPreview" alt="Previsualització del Genograma">
        </div>

        <footer class="footer-financiadores">
            <p style="font-size: 0.65rem; color: #94a3b8; margin: 0;">Amb el suport de:</p>
            <div id="financiadoresContainer" class="financiadores-grid"></div>
            <p style="margin-top: 20px; color: #94a3b8; font-size: 0.7rem; text-align: center;">
                Aquest document conté informació confidencial vinculada a la BBDD NexeSocial protegida per la LOPD.
            </p>
        </footer>
    </div>

    <div class="floating-action-bar">
        <button class="float-btn btn-float-back" onclick="window.history.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div style="position: relative;">
            <div class="download-options" id="downloadMenu">
                <div class="opt-item" onclick="downloadImage('png')">Descarregar PNG</div>
                <div class="opt-item" onclick="downloadImage('jpg')">Descarregar JPG</div>
                <div class="opt-item" onclick="downloadPDF()">Exportar PDF Oficial</div>
            </div>
            <button class="float-btn btn-float-main" onclick="document.getElementById('downloadMenu').classList.toggle('active')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>
    </div>

    <script>
        // --- CONEXIÓ AMB LA BBDD SIMULADA ---
        window.onload = () => {
            // 1. Obtenir Sessió de l'usuari (Tècnic)
            const session = JSON.parse(sessionStorage.getItem('nexe_session'));
            const tecnicoNombre = session ? session.nombre : "Tècnic No Identificat";
            document.getElementById('valTec').innerText = tecnicoNombre;

            // 2. Obtenir Imatge Temporal del Genograma
            const imgData = localStorage.getItem('genograma_temp');
            if (imgData) document.getElementById('imgPreview').src = imgData;

            // 3. Obtenir dades de la Família de la BBDD (Simulada)
            // Nota: Aquí normalment passaries un ID per URL, per ara agafem la primera de la BBDD
            const dbPersones = JSON.parse(localStorage.getItem('nexe_persones'));
            
            // Simulem que estem treballant amb la FAM-0001 definida a la teva BBDD
            const familiaMock = {
                id: "FAM-0001",
                cognoms: "García Martí"
            };

            document.getElementById('valID').innerText = familiaMock.id;
            document.getElementById('valFam').innerText = familiaMock.cognoms;
            document.getElementById('valDate').innerText = new Date().toLocaleDateString('ca-ES');

            // 4. Finançadors (Logos)
            const logosRaw = localStorage.getItem('financiadores_logos');
            if (logosRaw) {
                const logos = JSON.parse(logosRaw);
                const container = document.getElementById('financiadoresContainer');
                logos.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'financiador-logo';
                    container.appendChild(img);
                });
            }
        };

        // --- FUNCIONS D'EXPORTACIÓ (MANTINGUDES) ---
        function getImageElement(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        async function downloadImage(format) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const sourceImg = document.getElementById('imgPreview');
            
            canvas.width = 2400; 
            canvas.height = 1800;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const l1 = await getImageElement(document.getElementById('logo1').src);
            const l2 = await getImageElement(document.getElementById('logo2').src);
            if(l1) ctx.drawImage(l1, 100, 80, 220, 80);
            if(l2) ctx.drawImage(l2, 350, 80, 220, 80);

            ctx.fillStyle = "#f8fafc";
            ctx.beginPath();
            ctx.roundRect(100, 200, 2200, 140, 20);
            ctx.fill();

            ctx.fillStyle = "#64748b";
            ctx.font = "800 24px Inter";
            ctx.fillText("ID FAMÍLIA", 150, 250);
            ctx.fillText("COGNOMS", 650, 250);
            ctx.fillText("TÈCNIC", 1300, 250);
            ctx.fillText("DATA", 1950, 250);

            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 32px Inter";
            ctx.fillText(document.getElementById('valID').innerText, 150, 300);
            ctx.fillText(document.getElementById('valFam').innerText, 650, 300);
            ctx.fillText(document.getElementById('valTec').innerText, 1300, 300);
            ctx.fillText(document.getElementById('valDate').innerText, 1950, 300);

            ctx.drawImage(sourceImg, 100, 400, 2200, 1200);

            const link = document.createElement('a');
            link.download = `Genograma_${document.getElementById('valID').innerText}.${format}`;
            link.href = canvas.toDataURL(`image/${format === 'jpg' ? 'jpeg' : 'png'}`, 1.0);
            link.click();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            const rasterize = async (elId) => {
                const img = await getImageElement(document.getElementById(elId).src);
                if (!img) return null;
                const c = document.createElement('canvas');
                c.width = img.width; c.height = img.height;
                c.getContext('2d').drawImage(img, 0, 0);
                return c.toDataURL('image/png');
            };

            const logo1Base64 = await rasterize('logo1');
            const logo2Base64 = await rasterize('logo2');

            if(logo1Base64) doc.addImage(logo1Base64, 'PNG', 15, 10, 35, 12);
            if(logo2Base64) doc.addImage(logo2Base64, 'PNG', 55, 10, 35, 12);
            
            doc.setFillColor(248, 250, 252);
            doc.roundedRect(15, 28, 267, 18, 3, 3, 'F');

            doc.setFontSize(6); doc.setTextColor(100, 116, 139);
            doc.text("ID FAMÍLIA", 20, 33);
            doc.text("COGNOMS", 80, 33);
            doc.text("TÈCNIC RESPONSABLE", 150, 33);
            doc.text("DATA EMISSIÓ", 230, 33);

            doc.setFontSize(9); doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold");
            doc.text(document.getElementById('valID').innerText, 20, 40);
            doc.text(document.getElementById('valFam').innerText, 80, 40);
            doc.text(document.getElementById('valTec').innerText, 150, 40);
            doc.text(document.getElementById('valDate').innerText, 230, 40);

            doc.addImage(document.getElementById('imgPreview').src, 'PNG', 15, 50, 267, 130);
            doc.setFontSize(8); doc.setFont("helvetica", "normal");
            doc.text("NexePsy Suite - Document d'ús professional confidencial", 148, 200, { align: "center" });

            doc.save(`Genograma_${document.getElementById('valID').innerText}.pdf`);
        }
    </script>
</body>
</html>
